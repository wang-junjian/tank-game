<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: white;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            border: 4px solid #333;
            background: #000;
        }

        #ui {
            margin-top: 10px;
            display: flex;
            gap: 30px;
            font-size: 18px;
        }

        #startScreen, #gameOverScreen, #configScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #configScreen {
            overflow-y: auto;
            padding: 20px;
        }

        .config-section {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
        }

        .config-section h3 {
            color: #ff6b35;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .config-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            font-size: 14px;
        }

        .config-item label {
            color: #ccc;
            flex: 1;
        }

        .config-item input[type="range"] {
            flex: 2;
            margin: 0 10px;
        }

        .config-item input[type="number"] {
            width: 60px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #333;
            color: white;
            padding: 4px;
            border-radius: 4px;
        }

        .config-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .config-buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .config-buttons button {
            padding: 10px 25px;
            font-size: 16px;
        }

        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ff6b35;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        #startScreen p, #gameOverScreen p {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ccc;
        }

        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            background: #ff6b35;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #ff8555;
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        .controls h3 {
            color: #ff6b35;
            margin-bottom: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="800"></canvas>
        
        <div id="startScreen">
            <h1>🎮 坦克大战</h1>
            <p>保护你的基地，消灭所有敌人！</p>
            <div class="controls">
                <h3>操作说明</h3>
                <p>WASD / 方向键 - 移动坦克</p>
                <p>空格键 - 发射子弹</p>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 15px;">
                <button id="startBtn">开始游戏</button>
                <button id="configBtn" style="background: #4CAF50;">⚙️ 配置</button>
            </div>
        </div>

        <div id="configScreen" class="hidden">
            <h1>⚙️ 游戏配置</h1>

            <div class="config-section">
                <h3>玩家配置</h3>
                <div class="config-item">
                    <label>移动速度</label>
                    <input type="range" id="playerSpeed" min="1" max="5" step="0.5" value="2">
                    <input type="number" id="playerSpeedNum" min="1" max="5" step="0.5" value="2">
                </div>
                <div class="config-item">
                    <label>射击冷却 (ms)</label>
                    <input type="range" id="playerCooldown" min="100" max="1000" step="50" value="300">
                    <input type="number" id="playerCooldownNum" min="100" max="1000" step="50" value="300">
                </div>
                <div class="config-item">
                    <label>初始生命</label>
                    <input type="range" id="initialLives" min="1" max="10" step="1" value="3">
                    <input type="number" id="initialLivesNum" min="1" max="10" step="1" value="3">
                </div>
            </div>

            <div class="config-section">
                <h3>敌人配置</h3>
                <div class="config-item">
                    <label>基础速度</label>
                    <input type="range" id="enemySpeed" min="0.5" max="3" step="0.1" value="1">
                    <input type="number" id="enemySpeedNum" min="0.5" max="3" step="0.1" value="1">
                </div>
                <div class="config-item">
                    <label>每关速度增加</label>
                    <input type="range" id="enemySpeedIncrease" min="0" max="1" step="0.1" value="0.2">
                    <input type="number" id="enemySpeedIncreaseNum" min="0" max="1" step="0.1" value="0.2">
                </div>
                <div class="config-item">
                    <label>初始数量</label>
                    <input type="range" id="enemyCount" min="1" max="10" step="1" value="4">
                    <input type="number" id="enemyCountNum" min="1" max="10" step="1" value="4">
                </div>
                <div class="config-item">
                    <label>每关数量增加</label>
                    <input type="range" id="enemyCountIncrease" min="0" max="3" step="1" value="1">
                    <input type="number" id="enemyCountIncreaseNum" min="0" max="3" step="1" value="1">
                </div>
                <div class="config-item">
                    <label>最大数量</label>
                    <input type="range" id="enemyMaxCount" min="5" max="20" step="1" value="8">
                    <input type="number" id="enemyMaxCountNum" min="5" max="20" step="1" value="8">
                </div>
            </div>

            <div class="config-section">
                <h3>道具配置</h3>
                <div class="config-item">
                    <label>生成间隔 (ms)</label>
                    <input type="range" id="powerupInterval" min="2000" max="20000" step="1000" value="5000">
                    <input type="number" id="powerupIntervalNum" min="2000" max="20000" step="1000" value="5000">
                </div>
                <div class="config-item">
                    <label>效果持续时间 (ms)</label>
                    <input type="range" id="powerupDuration" min="5000" max="30000" step="1000" value="10000">
                    <input type="number" id="powerupDurationNum" min="5000" max="30000" step="1000" value="10000">
                </div>
                <div class="config-item">
                    <label>道具生命周期 (ms)</label>
                    <input type="range" id="powerupLifetime" min="2000" max="10000" step="500" value="3000">
                    <input type="number" id="powerupLifetimeNum" min="2000" max="10000" step="500" value="3000">
                </div>
            </div>

            <div class="config-section">
                <h3>地图配置</h3>
                <div class="config-item">
                    <label>初始砖墙数量</label>
                    <input type="range" id="initialBricks" min="50" max="150" step="10" value="80">
                    <input type="number" id="initialBricksNum" min="50" max="150" step="10" value="80">
                </div>
                <div class="config-item">
                    <label>每关砖墙增加</label>
                    <input type="range" id="bricksPerLevel" min="0" max="30" step="5" value="10">
                    <input type="number" id="bricksPerLevelNum" min="0" max="30" step="5" value="10">
                </div>
                <div class="config-item">
                    <label>初始钢铁数量</label>
                    <input type="range" id="initialSteel" min="5" max="30" step="5" value="10">
                    <input type="number" id="initialSteelNum" min="5" max="30" step="5" value="10">
                </div>
                <div class="config-item">
                    <label>每关钢铁增加</label>
                    <input type="range" id="steelPerLevel" min="0" max="10" step="1" value="2">
                    <input type="number" id="steelPerLevelNum" min="0" max="10" step="1" value="2">
                </div>
            </div>

            <div class="config-section">
                <h3>音效配置</h3>
                <div class="config-item">
                    <label>音效开关</label>
                    <input type="checkbox" id="soundEnabled" checked>
                </div>
                <div class="config-item">
                    <label>音量</label>
                    <input type="range" id="soundVolume" min="0" max="1" step="0.1" value="0.5">
                    <input type="number" id="soundVolumeNum" min="0" max="1" step="0.1" value="0.5">
                </div>
            </div>

            <div class="config-buttons">
                <button id="saveConfigBtn">💾 保存配置</button>
                <button id="resetConfigBtn" style="background: #ff6b35;">🔄 重置默认</button>
                <button id="closeConfigBtn" style="background: #666;">关闭</button>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1 id="gameOverTitle">游戏结束</h1>
            <p id="finalScore">最终分数: 0</p>
            <p id="finalLevel">关卡: 1</p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>

    <div id="ui">
        <div>分数: <span id="score">0</span></div>
        <div>关卡: <span id="level">1</span></div>
        <div>生命: <span id="lives">3</span></div>
        <div>敌人: <span id="enemies">0</span></div>
        <div>音效: <button id="soundBtn" style="padding: 5px 10px; font-size: 14px; background: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer;">开启</button></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
